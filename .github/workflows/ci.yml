name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholder values: CI validates types and build, not a live DB.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=disable"
      AUTH_SECRET: "ci-placeholder-secret-not-used-in-production"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
