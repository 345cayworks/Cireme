# Netlify configuration — versioned (was previously UI-only).
# Fixes the IaC gap: build command, Node pin, Next plugin, migrate-on-deploy,
# and security headers now live in the repo.

[build]
  # On a real Netlify deploy with a database configured: apply Drizzle
  # migrations, then (if the super-admin secrets are set) create/refresh the
  # super-admin account, then build. The bootstrap is idempotent, so running
  # it every deploy is safe. Escape hatches: SKIP_DB_MIGRATE=1 skips the DB
  # step entirely; SKIP_ADMIN_BOOTSTRAP=1 skips only the admin step. Skipped
  # automatically in CI / when no database is configured.
  command = "if [ \"$NETLIFY\" = \"true\" ] && [ -z \"$SKIP_DB_MIGRATE\" ] && { [ -n \"$DATABASE_URL\" ] || [ -n \"$NETLIFY_DATABASE_URL\" ]; }; then npm run db:migrate && if [ -z \"$SKIP_ADMIN_BOOTSTRAP\" ] && [ -n \"$SUPER_ADMIN_EMAIL\" ] && [ -n \"$SUPERADMIN_MASTER_KEY\" ]; then npm run db:bootstrap-admin; fi; fi && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Baseline security headers for static/proxied responses. App-route (SSR)
# headers are also set in next.config.ts so they apply to dynamic responses.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), browsing-topics=()"
